kind = "web"
previewPath = "/"
title = "CAPRINA Order Management"
version = "1.0.0"
id = "artifacts/caprina"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24680

[services.development]
run = "pnpm --filter @workspace/caprina run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/caprina", "run", "build" ]
publicDir = "artifacts/caprina/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24680"
BASE_PATH = "/"
