<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <!-- Maskable safe zone: full bleed background -->
  <rect width="512" height="512" fill="#0a0a0a"/>
  <!-- Golden circle bg -->
  <circle cx="256" cy="256" r="180" fill="#1a1400"/>
  <circle cx="256" cy="256" r="175" fill="none" stroke="#c9971c" stroke-width="4" opacity="0.6"/>
  <!-- Phoenix / flame shape -->
  <g transform="translate(256,256)" fill="#c9971c">
    <!-- Center body -->
    <ellipse cx="0" cy="20" rx="28" ry="55" fill="#c9971c"/>
    <!-- Wings -->
    <path d="M-28,-10 C-90,-60 -120,20 -80,60 C-60,40 -40,10 -28,30 Z" fill="#c9971c" opacity="0.9"/>
    <path d="M28,-10 C90,-60 120,20 80,60 C60,40 40,10 28,30 Z" fill="#c9971c" opacity="0.9"/>
    <!-- Tail feathers -->
    <path d="M-20,60 C-50,110 -30,140 0,120 C30,140 50,110 20,60 Z" fill="#c9971c" opacity="0.8"/>
    <!-- Head -->
    <circle cx="0" cy="-50" r="22" fill="#c9971c"/>
    <!-- Beak -->
    <path d="M0,-30 L12,-20 L0,-15 Z" fill="#0a0a0a"/>
    <!-- Eye -->
    <circle cx="-8" cy="-55" r="4" fill="#0a0a0a"/>
    <circle cx="-7" cy="-55" r="2" fill="#c9971c"/>
    <!-- Crown feathers -->
    <path d="M-15,-68 C-20,-90 -5,-95 0,-75 C5,-95 20,-90 15,-68" fill="#c9971c"/>
    <!-- Inner wing detail -->
    <path d="M-20,0 C-60,-30 -70,30 -40,45" fill="none" stroke="#f0b429" stroke-width="2.5" opacity="0.7"/>
    <path d="M20,0 C60,-30 70,30 40,45" fill="none" stroke="#f0b429" stroke-width="2.5" opacity="0.7"/>
  </g>
  <!-- CAPRINA text -->
  <text x="256" y="470" text-anchor="middle" font-family="Arial Black, sans-serif"
        font-size="42" font-weight="900" fill="#c9971c" letter-spacing="8">CAPRINA</text>
</svg>
