<!DOCTYPE html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <script>
      (function(){
        var t = localStorage.getItem('caprina-theme') || 'dark';
        document.documentElement.classList.add(t);
      })();
    </script>

    <!-- Viewport + PWA display -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="mobile-web-app-capable" content="yes" />

    <!-- iOS Safari PWA -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="CAPRINA" />
    <link rel="apple-touch-icon" href="./logo.jpg" />
    <link rel="apple-touch-icon" sizes="152x152" href="./logo.jpg" />
    <link rel="apple-touch-icon" sizes="167x167" href="./logo.jpg" />
    <link rel="apple-touch-icon" sizes="180x180" href="./logo.jpg" />

    <!-- Android + Chrome PWA theme -->
    <meta name="theme-color" content="#c9971c" />
    <link rel="manifest" href="./manifest.json" />

    <!-- Windows -->
    <meta name="msapplication-TileColor" content="#0a0a0a" />
    <meta name="msapplication-TileImage" content="./logo.jpg" />

    <!-- SEO -->
    <meta name="description" content="نظام CAPRINA لإدارة الطلبات والمبيعات — تحكم كامل في دورة حياة طلباتك" />

    <!-- Icons -->
    <link rel="icon" type="image/svg+xml" href="./favicon.svg" />
    <link rel="shortcut icon" href="./favicon.svg" />

    <title>CAPRINA OS — إدارة الطلبات</title>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
